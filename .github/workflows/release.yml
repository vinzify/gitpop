name: Release GitPop
on:
  push:
    tags:
      - 'v*' # Triggers workflow when you push a tag like "v1.0.0"

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest # We only need Windows for GitPop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install web dependencies
        run: npm install

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'GitPop v__VERSION__'
          releaseBody: |
            ## What's Changed

            ### 🚀 New Features
            - **Adaptive Push UX**: The ↑ button now intelligently adapts — shows "Commit & Push" when files are staged, "Push ↑N" when commits are unpushed, and "Initial Push" for new branches
            - **Ahead Badge**: A `↑ N` indicator in the titlebar shows how many commits are ahead of remote at a glance
            - **Initial Push Support**: New repos and branches without an upstream are handled gracefully with `git push -u origin <branch>`

            ### 🐛 Bug Fixes
            - Fixed "stage files first" error when trying to push after committing
            - Commit button now properly disables when no files are staged

            ### 📦 Installation
            **Windows users:** Download `GitPop___VERSION___x64_en-US.msi` from the assets below, run it, and then launch GitPop from your Start Menu to install the context menu extension.
          releaseDraft: false
          prerelease: false
