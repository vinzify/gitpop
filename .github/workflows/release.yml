name: Release GitPop
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install web dependencies
        run: npm install

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'GitPop v__VERSION__'
          releaseBody: |
            ## What's Changed

            ### 🚀 New Features
            - **LM Studio Support**: Added native support for LM Studio and other OpenAI-compatible local AI runners.
            - **Model Discovery**: Auto-populate models from LM Studio and custom endpoints using the standard `/v1/models` API. 
            - **Refresh Models**: Added a refresh button in settings to pull latest models from local runners.

            ### 🔧 Improvements
            - Settings UI now distinguishes better between cloud and local providers.
            - Improved model selection logic for "Custom" providers.

            ### 📦 Installation
            **Windows users:** Download `GitPop___VERSION___x64_en-US.msi` from the assets below, run it, and then launch GitPop from your Start Menu to install the context menu extension.
          releaseDraft: false
          prerelease: false
